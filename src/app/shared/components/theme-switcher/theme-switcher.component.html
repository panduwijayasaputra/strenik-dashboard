<!-- ── Sidebar variant: inline controls ────────────────────────── -->
@if (variant() === 'sidebar') {
  <div class="flex flex-col gap-2 px-1">
    <!-- Mode row -->
    <div class="flex items-center gap-1">
      @for (m of modes; track m.value) {
        <button
          type="button"
          class="flex flex-1 items-center justify-center rounded-lg p-1.5 transition-colors hover:bg-muted"
          [class.bg-muted]="themeService.mode() === m.value"
          [class.text-foreground]="themeService.mode() === m.value"
          [class.text-muted-foreground]="themeService.mode() !== m.value"
          [attr.aria-label]="m.label + ' mode'"
          [title]="m.label"
          (click)="themeService.setMode(m.value)"
        >
          <lucide-icon [name]="m.icon" [size]="14" />
        </button>
      }
    </div>

    <!-- Palette row -->
    <div class="flex items-center justify-around">
      @for (p of palettes; track p.value) {
        <button
          type="button"
          class="h-5 w-5 rounded-full transition-all hover:scale-110"
          [class.ring-2]="themeService.palette() === p.value"
          [class.ring-offset-1]="themeService.palette() === p.value"
          [class.ring-primary]="themeService.palette() === p.value"
          [style.background-color]="p.color"
          [attr.aria-label]="p.label + ' palette'"
          [title]="p.label"
          (click)="themeService.setPalette(p.value)"
        ></button>
      }
    </div>
  </div>
}

<!-- ── Navbar variant: icon button + dropdown panel ────────────── -->
@if (variant() === 'navbar') {
  <div class="relative">
    <!-- Trigger button: shows current mode icon -->
    <button
      type="button"
      class="flex items-center justify-center rounded-lg p-2 text-muted-foreground transition-colors hover:bg-muted hover:text-foreground"
      aria-label="Theme settings"
      (click)="toggle()"
    >
      <lucide-icon [name]="activeModeIcon()" [size]="20" />
    </button>

    @if (isOpen()) {
      <!-- Backdrop -->
      <div class="fixed inset-0 z-10" (click)="close()"></div>

      <!-- Dropdown panel -->
      <div class="absolute right-0 z-20 mt-2 w-52 rounded-xl border border-border bg-surface p-3 shadow-lg">
        <!-- Mode section -->
        <p class="mb-2 text-[10px] font-semibold uppercase tracking-wider text-muted-foreground">Mode</p>
        <div class="flex gap-1">
          @for (m of modes; track m.value) {
            <button
              type="button"
              class="flex flex-1 flex-col items-center gap-1 rounded-lg py-2 text-xs transition-colors hover:bg-muted"
              [class.bg-muted]="themeService.mode() === m.value"
              [class.text-foreground]="themeService.mode() === m.value"
              [class.font-medium]="themeService.mode() === m.value"
              [class.text-muted-foreground]="themeService.mode() !== m.value"
              [attr.aria-label]="m.label + ' mode'"
              (click)="themeService.setMode(m.value)"
            >
              <lucide-icon [name]="m.icon" [size]="15" />
              <span>{{ m.label }}</span>
            </button>
          }
        </div>

        <!-- Palette section -->
        <p class="mb-2 mt-3 text-[10px] font-semibold uppercase tracking-wider text-muted-foreground">Accent</p>
        <div class="flex items-center justify-between px-1">
          @for (p of palettes; track p.value) {
            <button
              type="button"
              class="h-6 w-6 rounded-full transition-all hover:scale-110"
              [class.ring-2]="themeService.palette() === p.value"
              [class.ring-offset-2]="themeService.palette() === p.value"
              [class.ring-primary]="themeService.palette() === p.value"
              [style.background-color]="p.color"
              [attr.aria-label]="p.label + ' palette'"
              [title]="p.label"
              (click)="themeService.setPalette(p.value)"
            ></button>
          }
        </div>
      </div>
    }
  </div>
}
