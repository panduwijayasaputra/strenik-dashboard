<header class="flex h-16 flex-shrink-0 items-center gap-3 border-b border-border bg-surface px-4">

  <!-- Hamburger (mobile only) -->
  <button
    type="button"
    class="lg:hidden flex items-center justify-center rounded-lg p-2 text-muted-foreground transition-colors hover:bg-muted hover:text-foreground"
    aria-label="Open navigation menu"
    (click)="layoutService.openMobileDrawer()"
  >
    <lucide-icon name="menu" [size]="20" />
  </button>

  <!-- Search bar -->
  <div
    class="relative flex items-center transition-all duration-200"
    [class.w-64]="searchFocused()"
    [class.w-48]="!searchFocused()"
  >
    <lucide-icon
      name="search"
      [size]="16"
      class="absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground pointer-events-none"
    />
    <input
      type="text"
      placeholder="Search…"
      class="w-full rounded-lg border border-border bg-muted py-1.5 pl-12 pr-3 text-sm text-foreground placeholder:text-muted-foreground focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary"
      aria-label="Search"
      (focus)="searchFocused.set(true)"
      (blur)="searchFocused.set(false)"
    />
  </div>

  <!-- Spacer -->
  <div class="flex-1"></div>

  <!-- Right controls -->
  <app-theme-switcher variant="navbar" />
  <app-notifications-dropdown />
  <app-profile-dropdown />

</header>
