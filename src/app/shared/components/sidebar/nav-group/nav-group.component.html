<div>
  <!-- Group header button -->
  <button
    type="button"
    (click)="toggle()"
    class="group flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground"
    [matTooltip]="mini() ? item().label : ''"
    matTooltipPosition="right"
  >
    <lucide-icon [name]="item().icon" [size]="18" class="flex-shrink-0" />
    @if (!mini()) {
      <span class="flex-1 truncate text-left">{{ item().label }}</span>
      <lucide-icon
        name="chevron-right"
        [size]="14"
        class="flex-shrink-0 transition-transform duration-200"
        [class.rotate-90]="isOpen()"
      />
    }
  </button>

  <!-- Children list with CSS height transition -->
  @if (!mini()) {
    <div
      class="overflow-hidden transition-all duration-200"
      [style.max-height]="isOpen() ? '500px' : '0px'"
      [style.opacity]="isOpen() ? '1' : '0'"
    >
      <div class="ml-4 mt-0.5 border-l border-border pl-2">
        @for (child of item().children; track child.route) {
          <app-nav-item [item]="child" [mini]="false" />
        }
      </div>
    </div>
  }
</div>
