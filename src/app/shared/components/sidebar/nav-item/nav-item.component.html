<a
  [routerLink]="item().route"
  routerLinkActive="bg-primary/10 text-primary font-medium"
  [routerLinkActiveOptions]="{ exact: true }"
  class="group flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground"
  [matTooltip]="mini() ? item().label : ''"
  matTooltipPosition="right"
>
  <lucide-icon [name]="item().icon" [size]="18" class="flex-shrink-0" />
  @if (!mini()) {
    <span class="truncate">{{ item().label }}</span>
  }
</a>
