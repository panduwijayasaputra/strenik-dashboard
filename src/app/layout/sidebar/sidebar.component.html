<aside
  class="flex h-full flex-col overflow-hidden bg-base-100 border-r border-base-300 transition-all duration-300"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
  [class.w-60]="mobileMode()"
  [class.w-60]="!mobileMode() && !isMini()"
  [class.w-16]="!mobileMode() && isMini()"
>
  <!-- Logo / Brand (desktop only) -->
  @if (!mobileMode()) {
    <div class="flex h-16 flex-shrink-0 items-center gap-3 px-4 border-b border-base-300 overflow-hidden">
      <div class="flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-lg bg-primary">
        <span class="text-sm font-bold text-primary-content">S</span>
      </div>
      <span
        class="truncate overflow-hidden whitespace-nowrap text-base font-semibold text-base-content transition-all duration-300"
        [style.max-width]="isMini() ? '0px' : '160px'"
        [style.opacity]="isMini() ? '0' : '1'"
      >Strenik</span>
    </div>
  }
  @if (mobileMode()) {
    <div class="h-16 flex-shrink-0"></div>
  }

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto overflow-x-hidden px-2 py-3 space-y-0.5">
    @for (item of navItems; track item.label) {
      @if (item.children?.length) {
        <app-nav-group [item]="item" [mini]="isMini()" />
      } @else {
        <app-nav-item [item]="item" [mini]="isMini()" />
      }
    }
  </nav>

</aside>
