<div class="relative">
  <!-- Bell button -->
  <button
    type="button"
    class="btn btn-ghost btn-circle btn-sm relative"
    aria-label="Notifications"
    (click)="toggle()"
  >
    <lucide-icon name="bell" [size]="20" />
    @if (notificationsService.unreadCount() > 0) {
      <span
        class="absolute right-0.5 top-0.5 flex h-4 w-4 items-center justify-center rounded-full bg-error text-[10px] font-bold text-error-content"
      >
        {{ notificationsService.unreadCount() }}
      </span>
    }
  </button>

  <!-- Dropdown panel -->
  @if (isOpen()) {
    <!-- Backdrop to close on outside click -->
    <div class="fixed inset-0 z-10" (click)="close()"></div>

    <div
      class="absolute right-0 z-20 mt-2 w-80 rounded-xl border border-base-300 bg-base-100 shadow-lg"
    >
      <!-- Header -->
      <div class="flex items-center justify-between border-b border-base-300 px-4 py-3">
        <h3 class="text-sm font-semibold text-base-content">Notifications</h3>
        @if (notificationsService.unreadCount() > 0) {
          <button
            type="button"
            class="text-xs text-primary transition-colors hover:text-primary/80"
            (click)="notificationsService.markAllRead()"
          >
            Mark all as read
          </button>
        }
      </div>

      <!-- Notification list -->
      <ul class="max-h-80 overflow-y-auto py-1">
        @for (n of notificationsService.notifications(); track n.id) {
          <li>
            <button
              type="button"
              class="flex w-full gap-3 px-4 py-3 text-left transition-colors hover:bg-base-200"
              [class.opacity-50]="n.read"
              (click)="notificationsService.markRead(n.id)"
            >
              <!-- Icon -->
              <div class="flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-full bg-primary/10 text-primary">
                <lucide-icon name="bell" [size]="14" />
              </div>
              <!-- Content -->
              <div class="min-w-0 flex-1">
                <p class="truncate text-sm font-medium text-base-content">{{ n.title }}</p>
                <p class="truncate text-xs text-base-content/60">{{ n.description }}</p>
                <p class="mt-0.5 text-xs text-base-content/60">{{ relativeTime(n.timestamp) }}</p>
              </div>
              <!-- Unread dot -->
              @if (!n.read) {
                <div class="mt-1.5 h-2 w-2 flex-shrink-0 rounded-full bg-primary"></div>
              }
            </button>
          </li>
        }
      </ul>
    </div>
  }
</div>
